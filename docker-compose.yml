services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: evidence_store
      POSTGRES_USER: evidence
      POSTGRES_PASSWORD: evidence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidence -d evidence_store"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      EVIDENCE_DATABASE_URL: postgres://evidence:evidence@db:5432/evidence_store?sslmode=disable
      EVIDENCE_LISTEN_ADDR: ":8000"
    ports:
      - "8000:8000"

volumes:
  pgdata:
