<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidence Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="container">
        <nav>
            <ul><li><strong>Evidence Store</strong></li></ul>
            <ul>
                <li><a href="#" class="nav-tab active" data-tab="search">Search</a></li>
                <li><a href="#" class="nav-tab" data-tab="add">Add Result</a></li>
                <li id="health-status"></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section id="tab-add" class="tab-content" hidden>
            <h4>Add Manual Test Result</h4>
            <div id="template-bar">
                <label>Template
                    <span class="input-with-button">
                        <select id="template-select">
                            <option value="">-- No template --</option>
                        </select>
                        <button type="button" class="secondary outline" id="template-manage" title="Manage templates">Manage</button>
                        <button type="button" class="secondary outline" id="template-save-current" title="Save current form as template">Save as Template</button>
                    </span>
                </label>
            </div>
            <form id="add-form">
                <div class="grid">
                    <label>Repo <small>(required)</small>
                        <input type="text" name="repo" placeholder="org/repo" required>
                    </label>
                    <label>Branch
                        <input type="text" name="branch" placeholder="main">
                    </label>
                    <label>Commit <small>(required)</small>
                        <input type="text" name="rcs_ref" placeholder="abc123..." required>
                    </label>
                </div>
                <div class="grid">
                    <label>Procedure <small>(required)</small>
                        <input type="text" name="procedure_ref" placeholder="manual/login-flow" required>
                    </label>
                    <label>Evidence type <small>(required)</small>
                        <input type="text" name="evidence_type" value="manual" required>
                    </label>
                    <label>Source <small>(required)</small>
                        <input type="text" name="source" placeholder="your name" required>
                    </label>
                </div>
                <div class="grid">
                    <fieldset>
                        <legend>Result <small>(required)</small></legend>
                        <label><input type="radio" name="result" value="PASS" required> PASS</label>
                        <label><input type="radio" name="result" value="FAIL"> FAIL</label>
                        <label><input type="radio" name="result" value="ERROR"> ERROR</label>
                        <label><input type="radio" name="result" value="SKIPPED"> SKIPPED</label>
                    </fieldset>
                    <label>Finished at
                        <span class="input-with-button">
                            <input type="text" name="finished_at" placeholder="2026-03-30 14:00">
                            <button type="button" id="fill-now" class="secondary outline" title="Fill with current time">Now</button>
                        </span>
                    </label>
                    <label>Tags
                        <input type="text" name="tags" placeholder="manual,regression">
                    </label>
                </div>
                <label>Notes
                    <textarea name="notes" rows="3" placeholder="Optional notes about the test result..."></textarea>
                </label>
                <fieldset class="custom-fields">
                    <legend>Custom metadata</legend>
                    <div id="custom-fields-list"></div>
                    <button type="button" class="secondary outline" id="add-custom-field">+ Add field</button>
                </fieldset>
                <div class="filter-actions">
                    <button type="submit">Submit</button>
                    <button type="button" class="secondary" id="add-another">Submit &amp; Add Another</button>
                </div>
            </form>
            <div id="add-feedback"></div>
        </section>

        <section id="tab-search" class="tab-content">
        <details id="filter-panel" open>
            <summary>Filters</summary>
            <form id="filter-form">
                <div class="grid">
                    <label>Repo <input type="text" name="repo" placeholder="org/repo"></label>
                    <label>Branch <input type="text" name="branch" placeholder="main"></label>
                    <label>Commit <input type="text" name="rcs_ref" placeholder="abc123..."></label>
                </div>
                <div class="grid">
                    <label>Evidence type <input type="text" name="evidence_type" placeholder="bazel"></label>
                    <label>Source <input type="text" name="source" placeholder="CI URL or user"></label>
                    <label>Procedure <input type="text" name="procedure_ref" placeholder="//pkg:target"></label>
                </div>
                <div class="grid">
                    <fieldset>
                        <legend>Result</legend>
                        <label><input type="checkbox" name="result" value="PASS"> PASS</label>
                        <label><input type="checkbox" name="result" value="FAIL"> FAIL</label>
                        <label><input type="checkbox" name="result" value="ERROR"> ERROR</label>
                        <label><input type="checkbox" name="result" value="SKIPPED"> SKIPPED</label>
                    </fieldset>
                    <label>After <input type="text" name="finished_after" placeholder="2026-01-01 00:00"></label>
                    <label>Before <input type="text" name="finished_before" placeholder="2026-12-31 23:59"></label>
                </div>
                <div class="grid">
                    <label>Tags <input type="text" name="tags" placeholder="ci,nightly"></label>
                    <label>Limit <input type="number" name="limit" min="1" max="1000" placeholder="100"></label>
                    <label style="align-self:end"><input type="checkbox" name="include_inherited" checked> Include inherited</label>
                </div>
                <div class="filter-actions">
                    <button type="submit">Search</button>
                    <button type="button" class="secondary" id="clear-filters">Clear</button>
                </div>
            </form>
        </details>

        <div id="results-summary"></div>

        <figure>
            <table id="results-table">
                <thead>
                    <tr>
                        <th>Result</th>
                        <th>Procedure</th>
                        <th>Repo</th>
                        <th>Branch</th>
                        <th>Commit</th>
                        <th>Type</th>
                        <th>Source</th>
                        <th>Finished</th>
                        <th>Tags</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                    <tr><td colspan="9" class="empty-state">Enter filters and click Search</td></tr>
                </tbody>
            </table>
        </figure>

        <div id="pagination">
            <button id="prev-page" class="secondary" disabled>Previous</button>
            <button id="next-page" class="secondary" disabled>Next</button>
        </div>

        </section>

        <dialog id="template-dialog">
            <article>
                <header>
                    <button aria-label="Close" rel="prev" id="close-template-dialog"></button>
                    <h3 id="template-dialog-title">Manage Templates</h3>
                </header>
                <div id="template-dialog-content"></div>
            </article>
        </dialog>

        <dialog id="detail-dialog">
            <article>
                <header>
                    <button aria-label="Close" rel="prev" id="close-detail"></button>
                    <h3>Evidence Record</h3>
                </header>
                <div id="detail-content"></div>
            </article>
        </dialog>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
